<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="vsclaude. Pixie, a pixel-art companion, acts out everything a coding agent does, bound to real events.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#221a17"/>
      <stop offset="0.5" stop-color="#1a1614"/>
      <stop offset="1" stop-color="#131110"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop stop-color="#d97757" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#d97757" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="word" x1="0" y1="80" x2="0" y2="140" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f7efe9"/>
      <stop offset="1" stop-color="#e6d6ca"/>
    </linearGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#ffffff" fill-opacity="0.03"/>
    </pattern>

    <!-- Pixie: the pixel-art companion. Antennae, boxy head, bright eyes, a clay
         band, and four little legs. Defined once, reused everywhere. -->
    <g id="pixie">
      <line x1="18" y1="20" x2="9" y2="4" stroke="#d97757" stroke-width="5" stroke-linecap="round"/>
      <line x1="42" y1="20" x2="51" y2="4" stroke="#d97757" stroke-width="5" stroke-linecap="round"/>
      <rect x="12" y="18" width="36" height="40" rx="9" fill="#d97757"/>
      <rect x="12" y="20" width="36" height="9" rx="9" fill="#e08a6a"/>
      <rect x="14" y="45" width="32" height="11" rx="4" fill="#b85a38"/>
      <rect x="20" y="28" width="8" height="13" rx="3" fill="#1a1614"/>
      <rect x="32" y="28" width="8" height="13" rx="3" fill="#1a1614"/>
      <rect x="21.5" y="30" width="3" height="3" rx="1" fill="#f7efe9"/>
      <rect x="33.5" y="30" width="3" height="3" rx="1" fill="#f7efe9"/>
      <rect x="16" y="56" width="4" height="12" rx="2" fill="#c2603f"/>
      <rect x="24" y="56" width="4" height="12" rx="2" fill="#c2603f"/>
      <rect x="32" y="56" width="4" height="12" rx="2" fill="#c2603f"/>
      <rect x="40" y="56" width="4" height="12" rx="2" fill="#c2603f"/>
    </g>
  </defs>

  <rect width="1280" height="720" rx="22" fill="url(#bg)"/>
  <rect width="1280" height="720" rx="22" fill="url(#dots)"/>
  <rect x="1" y="1" width="1278" height="718" rx="21" fill="none" stroke="#3a312c" stroke-opacity="0.8"/>

  <!-- faint ledger lines behind Pixie -->
  <g stroke="#d8c9bf" stroke-opacity="0.05" stroke-width="2">
    <line x1="64" y1="150" x2="470" y2="150"/>
    <line x1="64" y1="194" x2="470" y2="194"/>
    <line x1="64" y1="238" x2="470" y2="238"/>
    <line x1="64" y1="282" x2="470" y2="282"/>
    <line x1="64" y1="326" x2="470" y2="326"/>
  </g>

  <!-- ============ Hero: the big Pixie ============ -->
  <ellipse cx="182" cy="238" rx="150" ry="140" fill="url(#glow)"/>
  <use href="#pixie" transform="translate(96 132) scale(2.8)"/>

  <!-- motion squares trailing from the right antenna -->
  <rect x="258" y="146" width="18" height="18" rx="3" fill="#d97757"/>
  <rect x="288" y="132" width="13" height="13" rx="3" fill="#c2603f"/>
  <rect x="312" y="122" width="9" height="9" rx="2" fill="#b85a38" fill-opacity="0.85"/>
  <rect x="330" y="115" width="6" height="6" rx="1.5" fill="#b85a38" fill-opacity="0.6"/>

  <!-- Pixie name tag -->
  <g>
    <rect x="120" y="332" width="124" height="36" rx="18" fill="#3a2620" stroke="#d97757"/>
    <circle cx="146" cy="350" r="5" fill="#d97757"/>
    <text x="162" y="356" font-family="'JetBrains Mono','Cascadia Code',ui-monospace,monospace" font-size="19" font-weight="700" fill="#e8a07f">Pixie</text>
  </g>

  <!-- ============ Hero: wordmark and copy ============ -->
  <g transform="translate(412 0)">
    <text x="0" y="120" font-family="'JetBrains Mono','Cascadia Code',ui-monospace,monospace" font-size="72" font-weight="800" letter-spacing="-2">
      <tspan fill="#d97757">&gt;_</tspan><tspan fill="url(#word)"> vsclaude</tspan>
    </text>

    <text x="6" y="162" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="21" font-weight="600">
      <tspan fill="#c9b8ac">Claude Code, in motion.</tspan><tspan fill="#d97757">  For any model.</tspan>
    </text>

    <!-- punchy chips -->
    <g transform="translate(6 182)" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="14.5" font-weight="600">
      <g>
        <rect x="0" y="0" width="214" height="34" rx="17" fill="#2c2521" stroke="#3a312c"/>
        <text x="107" y="22" text-anchor="middle" fill="#c9b8ac">0 runtime dependencies</text>
      </g>
      <g transform="translate(226 0)">
        <rect x="0" y="0" width="164" height="34" rx="17" fill="#2c2521" stroke="#3a312c"/>
        <text x="82" y="22" text-anchor="middle" fill="#c9b8ac">bring your own key</text>
      </g>
      <g transform="translate(402 0)">
        <rect x="0" y="0" width="78" height="34" rx="17" fill="#3a2620" stroke="#d97757"/>
        <text x="39" y="22" text-anchor="middle" fill="#e8a07f">v0.1.0</text>
      </g>
    </g>

    <text x="6" y="252" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="15" fill="#a8998f">
      The companion acts out what the agent is doing, live and captioned.
    </text>
    <text x="6" y="280" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="14" fill="#7fb069">
      One click drills into the exact tool, inputs, diff, and raw output.
    </text>

    <!-- providers -->
    <g transform="translate(6 300)" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="13.5" font-weight="600">
      <text x="0" y="22" fill="#8a7c72">Claude Code</text>
      <text x="120" y="22" fill="#8a7c72">Codex</text>
      <text x="196" y="22" fill="#8a7c72">Gemini</text>
      <text x="284" y="22" fill="#8a7c72">Ollama</text>
      <text x="360" y="22" fill="#5d524a">and more</text>
    </g>
  </g>

  <!-- ============ Every behavior, with its symbol ============ -->
  <text x="64" y="388" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="15" font-weight="600" fill="#8a7c72">
    Pixie performs every move a coding agent makes, each one captioned in plain language:
  </text>

  <!-- ROW 1 -->
  <!-- greet -->
  <g transform="translate(63 402)">
    <rect width="132" height="104" rx="14" fill="#221d1a" stroke="#3a312c"/>
    <use href="#pixie" transform="translate(40 14) scale(0.86)"/>
    <rect x="92" y="12" width="32" height="22" rx="7" fill="#2c2521" stroke="#3a312c"/>
    <text x="108" y="27" text-anchor="middle" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="13" font-weight="700" fill="#e8a07f">hi</text>
  </g>
  <text x="129" y="524" text-anchor="middle" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="14" fill="#b3a499">greet</text>

  <!-- think -->
  <g transform="translate(209 402)">
    <rect width="132" height="104" rx="14" fill="#221d1a" stroke="#3a312c"/>
    <use href="#pixie" transform="translate(40 14) scale(0.86)"/>
    <rect x="100" y="20" width="14" height="14" rx="3" fill="#d97757"/>
    <rect x="118" y="10" width="8" height="8" rx="2" fill="#c2603f"/>
  </g>
  <text x="275" y="524" text-anchor="middle" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="14" fill="#b3a499">think</text>

  <!-- plan -->
  <g transform="translate(355 402)">
    <rect width="132" height="104" rx="14" fill="#221d1a" stroke="#3a312c"/>
    <use href="#pixie" transform="translate(40 14) scale(0.86)"/>
    <rect x="96" y="20" width="22" height="28" rx="3" fill="#2c2521" stroke="#d97757" stroke-width="2"/>
    <rect x="102" y="16" width="10" height="6" rx="2" fill="#d97757"/>
    <path d="M100 30 l3 3 l5 -5" stroke="#7fb069" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M100 40 l3 3 l5 -5" stroke="#7fb069" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  <text x="421" y="524" text-anchor="middle" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="14" fill="#b3a499">plan</text>

  <!-- read -->
  <g transform="translate(501 402)">
    <rect width="132" height="104" rx="14" fill="#221d1a" stroke="#3a312c"/>
    <use href="#pixie" transform="translate(40 14) scale(0.86)"/>
    <rect x="98" y="18" width="20" height="26" rx="2" fill="#2c2521" stroke="#d97757" stroke-width="2"/>
    <line x1="102" y1="25" x2="114" y2="25" stroke="#a8998f" stroke-width="1.6"/>
    <line x1="102" y1="31" x2="114" y2="31" stroke="#a8998f" stroke-width="1.6"/>
    <line x1="102" y1="37" x2="110" y2="37" stroke="#a8998f" stroke-width="1.6"/>
  </g>
  <text x="567" y="524" text-anchor="middle" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="14" fill="#b3a499">read</text>

  <!-- search -->
  <g transform="translate(647 402)">
    <rect width="132" height="104" rx="14" fill="#221d1a" stroke="#3a312c"/>
    <use href="#pixie" transform="translate(40 14) scale(0.86)"/>
    <circle cx="102" cy="74" r="10" fill="#2c2521" stroke="#d97757" stroke-width="2.5"/>
    <line x1="109" y1="81" x2="118" y2="90" stroke="#d97757" stroke-width="3" stroke-linecap="round"/>
  </g>
  <text x="713" y="524" text-anchor="middle" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="14" fill="#b3a499">search</text>

  <!-- web -->
  <g transform="translate(793 402)">
    <rect width="132" height="104" rx="14" fill="#221d1a" stroke="#3a312c"/>
    <use href="#pixie" transform="translate(40 14) scale(0.86)"/>
    <circle cx="106" cy="32" r="12" fill="none" stroke="#6c9bd9" stroke-width="2"/>
    <ellipse cx="106" cy="32" rx="5" ry="12" fill="none" stroke="#6c9bd9" stroke-width="1.4"/>
    <line x1="94" y1="32" x2="118" y2="32" stroke="#6c9bd9" stroke-width="1.4"/>
  </g>
  <text x="859" y="524" text-anchor="middle" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="14" fill="#b3a499">web</text>

  <!-- type (legs on the keyboard) -->
  <g transform="translate(939 402)">
    <rect width="132" height="104" rx="14" fill="#221d1a" stroke="#3a312c"/>
    <use href="#pixie" transform="translate(40 12) scale(0.86)"/>
    <rect x="28" y="74" width="76" height="16" rx="4" fill="#2c2521" stroke="#d97757" stroke-width="1.6"/>
    <g fill="#5a4d44">
      <rect x="34" y="78" width="9" height="8" rx="1.5"/>
      <rect x="47" y="78" width="9" height="8" rx="1.5"/>
      <rect x="60" y="78" width="9" height="8" rx="1.5"/>
      <rect x="73" y="78" width="9" height="8" rx="1.5"/>
      <rect x="86" y="78" width="9" height="8" rx="1.5"/>
    </g>
    <polygon points="110,40 112,46 118,48 112,50 110,56 108,50 102,48 108,46" fill="#e0a458"/>
  </g>
  <text x="1005" y="524" text-anchor="middle" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="14" fill="#b3a499">type</text>

  <!-- run -->
  <g transform="translate(1085 402)">
    <rect width="132" height="104" rx="14" fill="#221d1a" stroke="#3a312c"/>
    <use href="#pixie" transform="translate(40 14) scale(0.86)"/>
    <rect x="90" y="70" width="32" height="24" rx="4" fill="#161210" stroke="#d97757" stroke-width="1.6"/>
    <path d="M96 78 l4 3 l-4 3" stroke="#7fb069" stroke-width="2" fill="none" stroke-linecap="round"/>
    <line x1="104" y1="84" x2="113" y2="84" stroke="#7fb069" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="1151" y="524" text-anchor="middle" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="14" fill="#b3a499">run</text>

  <!-- ROW 2 -->
  <!-- debug -->
  <g transform="translate(63 556)">
    <rect width="132" height="104" rx="14" fill="#221d1a" stroke="#3a312c"/>
    <use href="#pixie" transform="translate(40 14) scale(0.86)"/>
    <g stroke="#231d1a" stroke-width="2" stroke-linecap="round">
      <line x1="94" y1="76" x2="87" y2="72"/><line x1="94" y1="82" x2="86" y2="82"/><line x1="94" y1="88" x2="87" y2="92"/>
      <line x1="114" y1="76" x2="121" y2="72"/><line x1="114" y1="82" x2="122" y2="82"/><line x1="114" y1="88" x2="121" y2="92"/>
    </g>
    <ellipse cx="104" cy="82" rx="11" ry="8" fill="#2a2320" stroke="#161210" stroke-width="1.5"/>
    <circle cx="104" cy="72" r="3.5" fill="#2a2320"/>
    <circle cx="101" cy="80" r="1.7" fill="#d96c6c"/>
    <circle cx="108" cy="84" r="1.7" fill="#d96c6c"/>
  </g>
  <text x="129" y="678" text-anchor="middle" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="14" fill="#b3a499">debug</text>

  <!-- build -->
  <g transform="translate(209 556)">
    <rect width="132" height="104" rx="14" fill="#221d1a" stroke="#3a312c"/>
    <use href="#pixie" transform="translate(40 14) scale(0.86)"/>
    <g transform="translate(106 66) rotate(35)">
      <rect x="-2.5" y="-2" width="5" height="26" rx="2" fill="#b8a99e"/>
      <rect x="-10" y="-9" width="20" height="9" rx="2" fill="#d97757"/>
    </g>
  </g>
  <text x="275" y="678" text-anchor="middle" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="14" fill="#b3a499">build</text>

  <!-- git -->
  <g transform="translate(355 556)">
    <rect width="132" height="104" rx="14" fill="#221d1a" stroke="#3a312c"/>
    <use href="#pixie" transform="translate(40 14) scale(0.86)"/>
    <line x1="100" y1="22" x2="100" y2="46" stroke="#d97757" stroke-width="2.5"/>
    <path d="M100 30 q12 1 15 9" stroke="#d97757" stroke-width="2.5" fill="none"/>
    <circle cx="100" cy="22" r="4.5" fill="#d97757"/>
    <circle cx="100" cy="46" r="4.5" fill="#d97757"/>
    <circle cx="117" cy="41" r="4.5" fill="#7fb069"/>
  </g>
  <text x="421" y="678" text-anchor="middle" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="14" fill="#b3a499">git</text>

  <!-- spawn -->
  <g transform="translate(501 556)">
    <rect width="132" height="104" rx="14" fill="#221d1a" stroke="#3a312c"/>
    <use href="#pixie" transform="translate(34 12) scale(0.82)"/>
    <line x1="74" y1="60" x2="96" y2="72" stroke="#d97757" stroke-width="2" stroke-dasharray="3 3"/>
    <use href="#pixie" transform="translate(86 56) scale(0.5)"/>
  </g>
  <text x="567" y="678" text-anchor="middle" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="14" fill="#b3a499">spawn</text>

  <!-- wait -->
  <g transform="translate(647 556)">
    <rect width="132" height="104" rx="14" fill="#221d1a" stroke="#3a312c"/>
    <use href="#pixie" transform="translate(40 14) scale(0.86)"/>
    <g stroke="#e0a458" stroke-width="2.5" fill="none" stroke-linecap="round">
      <circle cx="100" cy="28" r="6"/>
      <line x1="104" y1="32" x2="114" y2="44"/>
      <line x1="110" y1="40" x2="114" y2="36"/>
      <line x1="113" y1="43" x2="117" y2="39"/>
    </g>
  </g>
  <text x="713" y="678" text-anchor="middle" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="14" fill="#b3a499">wait</text>

  <!-- cost -->
  <g transform="translate(793 556)">
    <rect width="132" height="104" rx="14" fill="#221d1a" stroke="#3a312c"/>
    <use href="#pixie" transform="translate(40 14) scale(0.86)"/>
    <circle cx="106" cy="30" r="12" fill="none" stroke="#e0a458" stroke-width="2"/>
    <text x="106" y="35" text-anchor="middle" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="14" font-weight="700" fill="#e0a458">$</text>
  </g>
  <text x="859" y="678" text-anchor="middle" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="14" fill="#b3a499">cost</text>

  <!-- done -->
  <g transform="translate(939 556)">
    <rect width="132" height="104" rx="14" fill="#221d1a" stroke="#3a312c"/>
    <use href="#pixie" transform="translate(40 14) scale(0.86)"/>
    <circle cx="104" cy="76" r="13" fill="#7fb069"/>
    <path d="M97 76 l5 5 l8 -10" stroke="#1a1614" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="1005" y="678" text-anchor="middle" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="14" fill="#b3a499">done</text>

  <!-- stuck -->
  <g transform="translate(1085 556)">
    <rect width="132" height="104" rx="14" fill="#221d1a" stroke="#3a312c"/>
    <use href="#pixie" transform="translate(40 14) scale(0.86)"/>
    <text x="110" y="38" text-anchor="middle" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="24" font-weight="800" fill="#d96c6c">?</text>
  </g>
  <text x="1151" y="678" text-anchor="middle" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="14" fill="#b3a499">stuck</text>
</svg>
