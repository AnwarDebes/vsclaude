<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" font-family="'JetBrains Mono','SF Mono','DejaVu Sans Mono',monospace" shape-rendering="crispEdges">
  <defs>
    <!-- Pixie, the coral pixel creature, drawn once and reused everywhere -->
    <g id="pixie">
      <rect x="9" y="4" width="2" height="4" fill="#d97757"/>
      <rect x="8" y="3" width="3" height="2" fill="#e8a085"/>
      <rect x="21" y="4" width="2" height="4" fill="#d97757"/>
      <rect x="21" y="3" width="3" height="2" fill="#e8a085"/>
      <rect x="7" y="8" width="18" height="16" fill="#d97757"/>
      <rect x="6" y="9" width="20" height="14" fill="#d97757"/>
      <rect x="8" y="9" width="16" height="2" fill="#e8a085"/>
      <rect x="7" y="21" width="18" height="2" fill="#b85d40"/>
      <rect x="11" y="13" width="3" height="4" fill="#2b2a27"/>
      <rect x="18" y="13" width="3" height="4" fill="#2b2a27"/>
      <rect x="12" y="13" width="1" height="1" fill="#f4efe2"/>
      <rect x="19" y="13" width="1" height="1" fill="#f4efe2"/>
      <rect x="9" y="24" width="2" height="4" fill="#b85d40"/>
      <rect x="13" y="24" width="2" height="4" fill="#b85d40"/>
      <rect x="17" y="24" width="2" height="4" fill="#b85d40"/>
      <rect x="21" y="24" width="2" height="4" fill="#b85d40"/>
    </g>
  </defs>

  <!-- panel -->
  <rect x="6" y="6" width="1188" height="588" rx="18" fill="#1a1915" stroke="#34322a" stroke-width="2"/>

  <!-- faint pixel scanlines behind the hero -->
  <g opacity="0.06" fill="#d97757">
    <rect x="40" y="40" width="280" height="2"/>
    <rect x="40" y="90" width="280" height="2"/>
    <rect x="40" y="140" width="280" height="2"/>
    <rect x="40" y="190" width="280" height="2"/>
    <rect x="40" y="240" width="280" height="2"/>
  </g>

  <!-- hero mascot -->
  <use href="#pixie" transform="translate(78,84) scale(4.3)"/>
  <text x="147" y="232" font-size="13" fill="#75736b" text-anchor="middle">Pixie</text>
  <g fill="#d97757">
    <rect x="232" y="112" width="8" height="8" opacity="0.9"/>
    <rect x="248" y="96" width="10" height="10" opacity="0.6"/>
    <rect x="266" y="78" width="12" height="12" opacity="0.35"/>
  </g>

  <!-- title + tagline -->
  <text x="318" y="118" font-size="70" font-weight="700" fill="#edeae0" letter-spacing="1">vsclaude</text>
  <text x="320" y="158" font-size="21" fill="#d97757">Claude Code, in motion. For any model.</text>

  <!-- stat pills -->
  <g font-size="14" fill="#a8a69b" text-anchor="middle">
    <rect x="320" y="186" width="148" height="30" rx="15" fill="#211d18" stroke="#34322a"/>
    <text x="394" y="206">for any model</text>
    <rect x="480" y="186" width="178" height="30" rx="15" fill="#211d18" stroke="#34322a"/>
    <text x="569" y="206">bring your own key</text>
    <rect x="670" y="186" width="132" height="30" rx="15" fill="#211d18" stroke="#34322a"/>
    <text x="736" y="206">open source</text>
  </g>

  <text x="320" y="252" font-size="14" fill="#75736b">The mascot acts out what the agent is doing, live and captioned.</text>
  <text x="320" y="276" font-size="13" fill="#75736b">One click drills into the exact tool, inputs, diff, and raw output.</text>

  <!-- providers strip on the right -->
  <text x="1082" y="86" font-size="14" fill="#a8a69b" text-anchor="middle">Claude Code</text>
  <text x="1082" y="110" font-size="14" fill="#a8a69b" text-anchor="middle">Codex</text>
  <text x="1082" y="134" font-size="14" fill="#a8a69b" text-anchor="middle">Gemini</text>
  <text x="1082" y="158" font-size="14" fill="#a8a69b" text-anchor="middle">Ollama</text>
  <text x="1082" y="180" font-size="12" fill="#75736b" text-anchor="middle">+ more</text>

  <!-- ============ every move the agent makes ============ -->
  <text x="600" y="336" font-size="14" fill="#75736b" text-anchor="middle">Pixie performs every move the agent makes, each one captioned in plain language</text>

  <!-- ROW 1 -->
  <!-- greet -->
  <g transform="translate(44 358)">
    <rect width="80" height="80" rx="8" fill="#15140f" stroke="#34322a"/>
    <use href="#pixie" transform="translate(14 15) scale(1.6)"/>
    <rect x="60" y="40" width="11" height="12" fill="#d97757"/>
    <rect x="60" y="35" width="2" height="6" fill="#d97757"/>
    <rect x="63" y="34" width="2" height="7" fill="#d97757"/>
    <rect x="66" y="34" width="2" height="7" fill="#d97757"/>
    <rect x="69" y="35" width="2" height="6" fill="#d97757"/>
    <rect x="73" y="42" width="3" height="2" fill="#e8a085" opacity="0.7"/>
  </g>
  <text x="84" y="454" font-size="12" fill="#75736b" text-anchor="middle">greet</text>

  <!-- think -->
  <g transform="translate(158 358)">
    <rect width="80" height="80" rx="8" fill="#15140f" stroke="#34322a"/>
    <use href="#pixie" transform="translate(14 15) scale(1.6)"/>
    <rect x="58" y="16" width="6" height="6" fill="#d97757"/>
    <rect x="67" y="9" width="7" height="7" fill="#d97757" opacity="0.6"/>
  </g>
  <text x="198" y="454" font-size="12" fill="#75736b" text-anchor="middle">think</text>

  <!-- plan -->
  <g transform="translate(272 358)">
    <rect width="80" height="80" rx="8" fill="#15140f" stroke="#34322a"/>
    <use href="#pixie" transform="translate(14 15) scale(1.6)"/>
    <rect x="55" y="20" width="21" height="28" fill="#211d18" stroke="#34322a"/>
    <rect x="62" y="16" width="7" height="6" fill="#34322a"/>
    <rect x="58" y="26" width="3" height="3" fill="#7db36a"/>
    <rect x="63" y="27" width="10" height="2" fill="#a8a69b"/>
    <rect x="58" y="33" width="3" height="3" fill="#7db36a"/>
    <rect x="63" y="34" width="10" height="2" fill="#a8a69b"/>
    <rect x="58" y="40" width="3" height="3" fill="#34322a"/>
    <rect x="63" y="41" width="7" height="2" fill="#a8a69b"/>
  </g>
  <text x="312" y="454" font-size="12" fill="#75736b" text-anchor="middle">plan</text>

  <!-- read -->
  <g transform="translate(386 358)">
    <rect width="80" height="80" rx="8" fill="#15140f" stroke="#34322a"/>
    <use href="#pixie" transform="translate(14 15) scale(1.6)"/>
    <rect x="55" y="18" width="19" height="25" fill="#211d18" stroke="#34322a"/>
    <rect x="59" y="23" width="11" height="2" fill="#a8a69b"/>
    <rect x="59" y="28" width="11" height="2" fill="#a8a69b"/>
    <rect x="59" y="33" width="11" height="2" fill="#a8a69b"/>
    <rect x="59" y="38" width="7" height="2" fill="#a8a69b"/>
  </g>
  <text x="426" y="454" font-size="12" fill="#75736b" text-anchor="middle">read</text>

  <!-- search -->
  <g transform="translate(500 358)">
    <rect width="80" height="80" rx="8" fill="#15140f" stroke="#34322a"/>
    <use href="#pixie" transform="translate(14 15) scale(1.6)"/>
    <circle cx="59" cy="56" r="8" fill="none" stroke="#2b2a27" stroke-width="3"/>
    <circle cx="59" cy="56" r="4" fill="#bfe0e8"/>
    <rect x="64" y="61" width="9" height="4" fill="#2b2a27" transform="rotate(45 64 61)"/>
  </g>
  <text x="540" y="454" font-size="12" fill="#75736b" text-anchor="middle">search</text>

  <!-- web -->
  <g transform="translate(614 358)">
    <rect width="80" height="80" rx="8" fill="#15140f" stroke="#34322a"/>
    <use href="#pixie" transform="translate(14 15) scale(1.6)"/>
    <circle cx="61" cy="28" r="10" fill="none" stroke="#6c9bd9" stroke-width="2"/>
    <rect x="51" y="27" width="20" height="2" fill="#6c9bd9"/>
    <ellipse cx="61" cy="28" rx="4" ry="10" fill="none" stroke="#6c9bd9" stroke-width="2"/>
  </g>
  <text x="654" y="454" font-size="12" fill="#75736b" text-anchor="middle">web</text>

  <!-- type (legs on the keyboard) -->
  <g transform="translate(728 358)">
    <rect width="80" height="80" rx="8" fill="#15140f" stroke="#34322a"/>
    <use href="#pixie" transform="translate(14 12) scale(1.6)"/>
    <rect x="24" y="62" width="34" height="4" fill="#b85d40"/>
    <rect x="27" y="53" width="28" height="10" fill="#2b2a27"/>
    <rect x="29" y="55" width="24" height="6" fill="#bfe0e8"/>
  </g>
  <text x="768" y="454" font-size="12" fill="#75736b" text-anchor="middle">type</text>

  <!-- run -->
  <g transform="translate(842 358)">
    <rect width="80" height="80" rx="8" fill="#15140f" stroke="#34322a"/>
    <use href="#pixie" transform="translate(14 15) scale(1.6)"/>
    <rect x="54" y="50" width="22" height="18" fill="#15140f" stroke="#34322a"/>
    <rect x="57" y="54" width="2" height="2" fill="#7db36a"/>
    <rect x="59" y="56" width="2" height="2" fill="#7db36a"/>
    <rect x="57" y="58" width="2" height="2" fill="#7db36a"/>
    <rect x="62" y="60" width="9" height="2" fill="#7db36a"/>
  </g>
  <text x="882" y="454" font-size="12" fill="#75736b" text-anchor="middle">run</text>

  <!-- build -->
  <g transform="translate(956 358)">
    <rect width="80" height="80" rx="8" fill="#15140f" stroke="#34322a"/>
    <use href="#pixie" transform="translate(14 15) scale(1.6)"/>
    <rect x="55" y="46" width="10" height="10" fill="#d97757"/>
    <rect x="66" y="46" width="10" height="10" fill="#b85d40"/>
    <rect x="60" y="36" width="10" height="10" fill="#e8a085"/>
  </g>
  <text x="996" y="454" font-size="12" fill="#75736b" text-anchor="middle">build</text>

  <!-- debug -->
  <g transform="translate(1070 358)">
    <rect width="80" height="80" rx="8" fill="#15140f" stroke="#34322a"/>
    <use href="#pixie" transform="translate(14 15) scale(1.6)"/>
    <ellipse cx="60" cy="56" rx="7" ry="5" fill="#4a4640"/>
    <rect x="59" y="50" width="2" height="3" fill="#4a4640"/>
    <rect x="58" y="51" width="2" height="2" fill="#e0594e"/>
    <rect x="50" y="53" width="3" height="2" fill="#4a4640"/>
    <rect x="50" y="58" width="3" height="2" fill="#4a4640"/>
    <rect x="67" y="53" width="3" height="2" fill="#4a4640"/>
    <rect x="67" y="58" width="3" height="2" fill="#4a4640"/>
  </g>
  <text x="1110" y="454" font-size="12" fill="#75736b" text-anchor="middle">debug</text>

  <!-- ROW 2 -->
  <!-- git -->
  <g transform="translate(44 478)">
    <rect width="80" height="80" rx="8" fill="#15140f" stroke="#34322a"/>
    <use href="#pixie" transform="translate(14 15) scale(1.6)"/>
    <rect x="58" y="18" width="6" height="6" fill="#d97757"/>
    <rect x="58" y="42" width="6" height="6" fill="#d97757"/>
    <rect x="59" y="24" width="2" height="18" fill="#b85d40"/>
    <rect x="61" y="30" width="9" height="2" fill="#b85d40"/>
    <rect x="70" y="30" width="6" height="6" fill="#7db36a"/>
  </g>
  <text x="84" y="574" font-size="12" fill="#75736b" text-anchor="middle">git</text>

  <!-- spawn -->
  <g transform="translate(158 478)">
    <rect width="80" height="80" rx="8" fill="#15140f" stroke="#34322a"/>
    <use href="#pixie" transform="translate(10 14) scale(1.45)"/>
    <rect x="48" y="56" width="9" height="2" fill="#b85d40"/>
    <use href="#pixie" transform="translate(54 46) scale(0.72)"/>
  </g>
  <text x="198" y="574" font-size="12" fill="#75736b" text-anchor="middle">spawn</text>

  <!-- tool -->
  <g transform="translate(272 478)">
    <rect width="80" height="80" rx="8" fill="#15140f" stroke="#34322a"/>
    <use href="#pixie" transform="translate(14 15) scale(1.6)"/>
    <rect x="56" y="46" width="14" height="14" fill="#a8a69b"/>
    <rect x="60" y="42" width="6" height="4" fill="#a8a69b"/>
    <rect x="60" y="60" width="6" height="4" fill="#a8a69b"/>
    <rect x="52" y="50" width="4" height="6" fill="#a8a69b"/>
    <rect x="70" y="50" width="4" height="6" fill="#a8a69b"/>
    <rect x="60" y="50" width="6" height="6" fill="#15140f"/>
  </g>
  <text x="312" y="574" font-size="12" fill="#75736b" text-anchor="middle">tool</text>

  <!-- message -->
  <g transform="translate(386 478)">
    <rect width="80" height="80" rx="8" fill="#15140f" stroke="#34322a"/>
    <use href="#pixie" transform="translate(14 15) scale(1.6)"/>
    <rect x="54" y="22" width="22" height="15" fill="#211d18" stroke="#34322a"/>
    <rect x="58" y="37" width="6" height="4" fill="#211d18"/>
    <rect x="58" y="27" width="14" height="2" fill="#a8a69b"/>
    <rect x="58" y="31" width="10" height="2" fill="#a8a69b"/>
  </g>
  <text x="426" y="574" font-size="12" fill="#75736b" text-anchor="middle">message</text>

  <!-- delete -->
  <g transform="translate(500 478)">
    <rect width="80" height="80" rx="8" fill="#15140f" stroke="#34322a"/>
    <use href="#pixie" transform="translate(14 15) scale(1.6)"/>
    <rect x="56" y="46" width="16" height="16" fill="#4a4640"/>
    <rect x="54" y="42" width="20" height="3" fill="#b85d40"/>
    <rect x="61" y="38" width="6" height="3" fill="#b85d40"/>
    <rect x="60" y="50" width="2" height="9" fill="#2b2a27"/>
    <rect x="66" y="50" width="2" height="9" fill="#2b2a27"/>
  </g>
  <text x="540" y="574" font-size="12" fill="#75736b" text-anchor="middle">delete</text>

  <!-- wait -->
  <g transform="translate(614 478)">
    <rect width="80" height="80" rx="8" fill="#15140f" stroke="#34322a"/>
    <use href="#pixie" transform="translate(14 15) scale(1.6)"/>
    <rect x="55" y="24" width="10" height="10" fill="none" stroke="#f0c674" stroke-width="2"/>
    <rect x="64" y="32" width="2" height="14" fill="#f0c674"/>
    <rect x="66" y="40" width="4" height="2" fill="#f0c674"/>
    <rect x="66" y="44" width="3" height="2" fill="#f0c674"/>
  </g>
  <text x="654" y="574" font-size="12" fill="#75736b" text-anchor="middle">wait</text>

  <!-- cost -->
  <g transform="translate(728 478)">
    <rect width="80" height="80" rx="8" fill="#15140f" stroke="#34322a"/>
    <use href="#pixie" transform="translate(14 15) scale(1.6)"/>
    <rect x="54" y="44" width="18" height="18" fill="none" stroke="#f0c674" stroke-width="2"/>
    <text x="63" y="58" font-size="13" font-weight="700" fill="#f0c674" text-anchor="middle">$</text>
  </g>
  <text x="768" y="574" font-size="12" fill="#75736b" text-anchor="middle">cost</text>

  <!-- done -->
  <g transform="translate(842 478)">
    <rect width="80" height="80" rx="8" fill="#15140f" stroke="#34322a"/>
    <use href="#pixie" transform="translate(14 15) scale(1.6)"/>
    <path d="M 52 56 l 5 6 l 10 -12" fill="none" stroke="#7db36a" stroke-width="4" stroke-linecap="square"/>
    <rect x="50" y="40" width="3" height="3" fill="#f0c674"/>
    <rect x="68" y="46" width="3" height="3" fill="#f0c674"/>
  </g>
  <text x="882" y="574" font-size="12" fill="#75736b" text-anchor="middle">done</text>

  <!-- stuck -->
  <g transform="translate(956 478)">
    <rect width="80" height="80" rx="8" fill="#15140f" stroke="#34322a"/>
    <use href="#pixie" transform="translate(14 15) scale(1.6)"/>
    <text x="62" y="36" font-size="22" font-weight="700" fill="#e0594e">?</text>
  </g>
  <text x="996" y="574" font-size="12" fill="#75736b" text-anchor="middle">stuck</text>

  <!-- rest -->
  <g transform="translate(1070 478)">
    <rect width="80" height="80" rx="8" fill="#15140f" stroke="#34322a"/>
    <use href="#pixie" transform="translate(14 15) scale(1.6)"/>
    <text x="58" y="30" font-size="15" fill="#a8a69b">z</text>
    <text x="67" y="21" font-size="11" fill="#a8a69b" opacity="0.7">z</text>
  </g>
  <text x="1110" y="574" font-size="12" fill="#75736b" text-anchor="middle">rest</text>
</svg>
