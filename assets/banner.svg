<svg width="1280" height="600" viewBox="0 0 1280 600" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="vsclaude. Watch your AI coding agent work through living pixel-art animation. Pixie performs every step, bound to real events.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#221a17"/>
      <stop offset="0.55" stop-color="#1a1614"/>
      <stop offset="1" stop-color="#141110"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop stop-color="#d97757" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#d97757" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="word" x1="0" y1="100" x2="0" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f7efe9"/>
      <stop offset="1" stop-color="#e6d6ca"/>
    </linearGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#ffffff" fill-opacity="0.035"/>
    </pattern>
  </defs>

  <rect width="1280" height="600" rx="22" fill="url(#bg)"/>
  <rect width="1280" height="600" rx="22" fill="url(#dots)"/>
  <rect x="1" y="1" width="1278" height="598" rx="21" fill="none" stroke="#3a312c" stroke-opacity="0.8"/>

  <!-- ============ Pixie, in action: typing ============ -->
  <g>
    <ellipse cx="215" cy="240" rx="160" ry="150" fill="url(#glow)"/>

    <!-- speech bubble -->
    <g>
      <rect x="120" y="40" width="262" height="62" rx="16" fill="#2c2521" stroke="#3a312c"/>
      <polygon points="196,100 232,100 204,128" fill="#2c2521" stroke="#3a312c"/>
      <polygon points="198,101 230,101 205,125" fill="#2c2521"/>
      <text x="140" y="78" font-family="'JetBrains Mono','Cascadia Code',ui-monospace,monospace" font-size="18" fill="#e8a07f">Writing login.ts</text>
    </g>

    <!-- antennae -->
    <rect x="176" y="118" width="8" height="30" rx="4" fill="#d97757" transform="rotate(-12 180 133)"/>
    <rect x="246" y="118" width="8" height="30" rx="4" fill="#d97757" transform="rotate(12 250 133)"/>
    <circle cx="173" cy="116" r="9" fill="#e0a458"/>
    <circle cx="253" cy="116" r="9" fill="#e0a458"/>

    <!-- head -->
    <rect x="150" y="148" width="132" height="106" rx="22" fill="#d97757"/>
    <rect x="150" y="230" width="132" height="24" rx="12" fill="#c2603f"/>
    <!-- eyes (focused) -->
    <circle cx="190" cy="192" r="12" fill="#1a1614"/>
    <circle cx="242" cy="192" r="12" fill="#1a1614"/>
    <circle cx="193" cy="188" r="4" fill="#f7efe9"/>
    <circle cx="245" cy="188" r="4" fill="#f7efe9"/>
    <!-- focused mouth -->
    <rect x="201" y="222" width="30" height="6" rx="3" fill="#1a1614"/>

    <!-- body -->
    <rect x="178" y="256" width="76" height="52" rx="12" fill="#2c2521" stroke="#d97757" stroke-width="3"/>
    <rect x="197" y="270" width="26" height="7" rx="3" fill="#7fb069"/>

    <!-- arms reaching the keyboard -->
    <rect x="158" y="300" width="12" height="36" rx="6" fill="#d97757" transform="rotate(22 164 318)"/>
    <rect x="262" y="300" width="12" height="36" rx="6" fill="#d97757" transform="rotate(-22 268 318)"/>

    <!-- keyboard -->
    <rect x="150" y="322" width="132" height="28" rx="8" fill="#2c2521" stroke="#3a312c"/>
    <g fill="#4a3f38">
      <rect x="160" y="330" width="16" height="12" rx="2"/>
      <rect x="182" y="330" width="16" height="12" rx="2"/>
      <rect x="204" y="330" width="16" height="12" rx="2"/>
      <rect x="226" y="330" width="16" height="12" rx="2"/>
      <rect x="248" y="330" width="16" height="12" rx="2"/>
    </g>

    <!-- typing sparks -->
    <g fill="#e0a458">
      <polygon points="150,312 153,320 161,323 153,326 150,334 147,326 139,323 147,320"/>
      <polygon points="286,308 288,314 294,316 288,318 286,324 284,318 278,316 284,314"/>
    </g>

    <!-- name label -->
    <g>
      <rect x="160" y="364" width="112" height="34" rx="17" fill="#3a2620" stroke="#d97757"/>
      <circle cx="184" cy="381" r="5" fill="#d97757"/>
      <text x="200" y="387" font-family="'JetBrains Mono','Cascadia Code',ui-monospace,monospace" font-size="18" font-weight="700" fill="#e8a07f">Pixie</text>
    </g>
  </g>

  <!-- ============ Wordmark and description ============ -->
  <g transform="translate(412 0)">
    <text x="0" y="150" font-family="'JetBrains Mono','Cascadia Code',ui-monospace,monospace" font-size="80" font-weight="800" letter-spacing="-2">
      <tspan fill="#d97757">&gt;_</tspan><tspan fill="url(#word)"> vsclaude</tspan>
    </text>

    <text x="6" y="196" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="23" font-weight="600">
      <tspan fill="#c9b8ac">Claude Code, in motion.</tspan><tspan fill="#d97757">  For any model.</tspan>
    </text>

    <text x="6" y="234" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="17.5" fill="#a8998f">
      A cozy IDE where you watch your AI coding agent work as it thinks, reads,
    </text>
    <text x="6" y="260" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="17.5" fill="#a8998f">
      writes, searches, runs, and ships. Every move is bound to a real event.
    </text>
    <text x="6" y="290" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="14.5" fill="#7fb069">
      One click drills into the exact tool, inputs, diff, and raw output.
    </text>

    <!-- provider chips: bring your own key -->
    <g transform="translate(6 308)" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="15" font-weight="600">
      <g>
        <rect x="0" y="0" width="124" height="34" rx="17" fill="#2c2521" stroke="#3a312c"/>
        <text x="62" y="22" text-anchor="middle" fill="#c9b8ac">Claude Code</text>
      </g>
      <g transform="translate(136 0)">
        <rect x="0" y="0" width="76" height="34" rx="17" fill="#2c2521" stroke="#3a312c"/>
        <text x="38" y="22" text-anchor="middle" fill="#c9b8ac">Codex</text>
      </g>
      <g transform="translate(224 0)">
        <rect x="0" y="0" width="86" height="34" rx="17" fill="#2c2521" stroke="#3a312c"/>
        <text x="43" y="22" text-anchor="middle" fill="#c9b8ac">Gemini</text>
      </g>
      <g transform="translate(322 0)">
        <rect x="0" y="0" width="86" height="34" rx="17" fill="#2c2521" stroke="#3a312c"/>
        <text x="43" y="22" text-anchor="middle" fill="#c9b8ac">Ollama</text>
      </g>
      <g transform="translate(420 0)">
        <rect x="0" y="0" width="80" height="34" rx="17" fill="#3a2620" stroke="#d97757"/>
        <text x="40" y="22" text-anchor="middle" fill="#e8a07f">v0.1.0</text>
      </g>
    </g>
  </g>

  <!-- ============ Pixie in action: the filmstrip ============ -->
  <text x="64" y="430" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="15" font-weight="600" fill="#8a7c72">
    Pixie performs every step, captioned in plain language so anyone can follow along:
  </text>

  <!-- cell 1: reading -->
  <g transform="translate(64 442)">
    <rect width="224" height="116" rx="16" fill="#221d1a" stroke="#3a312c"/>
    <circle cx="40" cy="36" r="4" fill="#e0a458"/><circle cx="64" cy="36" r="4" fill="#e0a458"/>
    <rect x="24" y="40" width="56" height="44" rx="12" fill="#d97757"/>
    <circle cx="40" cy="60" r="6" fill="#1a1614"/><circle cx="64" cy="60" r="6" fill="#1a1614"/>
    <rect x="42" y="74" width="20" height="5" rx="2" fill="#1a1614"/>
    <text x="100" y="52" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="15" font-weight="700" fill="#e8a07f">reading</text>
    <text x="100" y="78" font-family="'Inter',system-ui,sans-serif" font-size="13" fill="#a8998f">Reading auth.ts</text>
  </g>

  <!-- cell 2: searching -->
  <g transform="translate(302 442)">
    <rect width="224" height="116" rx="16" fill="#221d1a" stroke="#3a312c"/>
    <circle cx="40" cy="36" r="4" fill="#e0a458"/><circle cx="64" cy="36" r="4" fill="#e0a458"/>
    <rect x="24" y="40" width="56" height="44" rx="12" fill="#d97757"/>
    <circle cx="40" cy="60" r="6" fill="#1a1614"/><circle cx="64" cy="60" r="6" fill="#1a1614"/>
    <rect x="42" y="74" width="20" height="5" rx="2" fill="#1a1614"/>
    <circle cx="78" cy="86" r="8" fill="none" stroke="#e0a458" stroke-width="3"/>
    <line x1="84" y1="92" x2="92" y2="100" stroke="#e0a458" stroke-width="3" stroke-linecap="round"/>
    <text x="100" y="52" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="15" font-weight="700" fill="#e8a07f">searching</text>
    <text x="100" y="78" font-family="'Inter',system-ui,sans-serif" font-size="13" fill="#a8998f">Find 'useAuth'</text>
  </g>

  <!-- cell 3: typing -->
  <g transform="translate(540 442)">
    <rect width="224" height="116" rx="16" fill="#221d1a" stroke="#3a312c"/>
    <circle cx="40" cy="36" r="4" fill="#e0a458"/><circle cx="64" cy="36" r="4" fill="#e0a458"/>
    <rect x="24" y="40" width="56" height="44" rx="12" fill="#d97757"/>
    <circle cx="40" cy="60" r="6" fill="#1a1614"/><circle cx="64" cy="60" r="6" fill="#1a1614"/>
    <rect x="42" y="74" width="20" height="5" rx="2" fill="#1a1614"/>
    <polygon points="84,42 86,48 92,50 86,52 84,58 82,52 76,50 82,48" fill="#e0a458"/>
    <text x="100" y="52" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="15" font-weight="700" fill="#e8a07f">typing</text>
    <text x="100" y="78" font-family="'Inter',system-ui,sans-serif" font-size="13" fill="#a8998f">Writing login.ts</text>
  </g>

  <!-- cell 4: running -->
  <g transform="translate(778 442)">
    <rect width="224" height="116" rx="16" fill="#221d1a" stroke="#3a312c"/>
    <circle cx="40" cy="36" r="4" fill="#6c9bd9"/><circle cx="64" cy="36" r="4" fill="#6c9bd9"/>
    <rect x="24" y="40" width="56" height="44" rx="12" fill="#6c9bd9"/>
    <circle cx="40" cy="60" r="6" fill="#1a1614"/><circle cx="64" cy="60" r="6" fill="#1a1614"/>
    <rect x="42" y="74" width="20" height="5" rx="2" fill="#1a1614"/>
    <text x="100" y="52" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="15" font-weight="700" fill="#9cc1ec">running</text>
    <text x="100" y="78" font-family="'Inter',system-ui,sans-serif" font-size="13" fill="#a8998f">Running tests</text>
  </g>

  <!-- cell 5: success -->
  <g transform="translate(1016 442)">
    <rect width="224" height="116" rx="16" fill="#221d1a" stroke="#3a312c"/>
    <polygon points="40,30 42,36 48,38 42,40 40,46 38,40 32,38 38,36" fill="#e0a458"/>
    <polygon points="78,32 80,37 85,39 80,41 78,46 76,41 71,39 76,37" fill="#7fb069"/>
    <rect x="24" y="40" width="56" height="44" rx="12" fill="#7fb069"/>
    <circle cx="40" cy="60" r="6" fill="#1a1614"/><circle cx="64" cy="60" r="6" fill="#1a1614"/>
    <path d="M44 75 q8 8 16 0" stroke="#1a1614" stroke-width="4" fill="none" stroke-linecap="round"/>
    <text x="100" y="52" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="15" font-weight="700" fill="#9ccf86">success</text>
    <text x="100" y="78" font-family="'Inter',system-ui,sans-serif" font-size="13" fill="#a8998f">All tests pass</text>
  </g>
</svg>
